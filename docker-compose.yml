services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-loyalty_system}
      POSTGRES_USER: ${POSTGRES_USER:-loyalty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loyalty}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loyalty} -d ${POSTGRES_DB:-loyalty_system}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-loyalty}:${POSTGRES_PASSWORD:-loyalty}@db:5432/${POSTGRES_DB:-loyalty_system}
      JWT_SECRET: ${JWT_SECRET:-change_me}
      OTP_SECRET: ${OTP_SECRET:-change_me}
      OTP_TTL_SECONDS: 300
      OTP_ATTEMPTS: 3
      OTP_COOLDOWN_SECONDS: 0
      OTP_ECHO: "false"
      OTP_LOG: ${OTP_LOG:-false}
      SMTP_HOST: ${SMTP_HOST:-host.docker.internal}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_IGNORE_TLS: ${SMTP_IGNORE_TLS:-true}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      MAIL_FROM: ${MAIL_FROM:-Avantaje Bonus <info@bonus-avantaje.ru>}
      OTP_EMAIL_SUBJECT: ${OTP_EMAIL_SUBJECT:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${FRONTEND_VITE_API_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
